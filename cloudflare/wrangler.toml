# SiteSentinel Proxy Worker — Wrangler configuration
# Deploy: wrangler deploy
# Docs:   https://developers.cloudflare.com/workers/wrangler/configuration/

name            = "sitesentinel-proxy"
main            = "proxy-worker.js"
compatibility_date = "2024-09-23"

# Smart Placement: Cloudflare automatically routes requests to the edge PoP
# nearest to the ORIGIN SERVER (target site) for minimum latency.
# This means a Dubai-hosted site will likely be fetched from the DXB PoP.
[placement]
mode = "smart"

# ── Secrets (set via CLI — never put real values here) ───────────────────────
# wrangler secret put PROXY_SECRET
# Then set the same value in backend/.env as CF_WORKER_SECRET

# ── Optional: per-environment overrides ──────────────────────────────────────
[env.production]
name = "sitesentinel-proxy"

[env.staging]
name = "sitesentinel-proxy-staging"

# ── Worker limits (free tier defaults) ───────────────────────────────────────
# CPU time: 10ms per request (free), 50ms (paid)
# Requests: 100,000/day (free), unlimited (paid $5/mo)
# Memory:   128MB
